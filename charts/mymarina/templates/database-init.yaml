{{- if .Values.database.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "mymarina.database.name" . }}-init-sql
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mymarina.labels" . | nindent 4 }}
    app.kubernetes.io/component: database
data:
  init.sql: |
    CREATE SCHEMA IF NOT EXISTS "{{ .Values.database.schema }}" AUTHORIZATION "{{ .Values.database.username }}";
{{- end }}
