{{- if .Values.marketing.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mymarina.marketing.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mymarina.labels" . | nindent 4 }}
    app.kubernetes.io/component: marketing
spec:
  replicas: {{ .Values.marketing.replicaCount }}
  selector:
    matchLabels:
      {{- include "mymarina.marketing.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "mymarina.marketing.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: marketing
          image: "{{ .Values.marketing.image.repository }}:{{ .Values.marketing.image.tag }}"
          imagePullPolicy: {{ .Values.marketing.image.pullPolicy }}
          env:
            - name: API_BASE_URL
              value: "https://{{ .Values.ingress.apiHost }}"
            - name: APP_URL
              value: "https://{{ .Values.ingress.appHost }}"
            - name: MARKETING_SITE_URL
              value: "https://{{ .Values.ingress.marketingHost }}"
          ports:
            - name: http
              containerPort: {{ .Values.marketing.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 20
          {{- with .Values.marketing.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
{{- end }}
