{{- $jwtSecretName := include "mymarina.jwt.credentialSecret" . }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $jwtSecretName }}
{{- $jwtKey := "" }}
{{- if and $existing $existing.data }}
{{- $jwtKey = index $existing.data "jwt-key" | b64dec }}
{{- else if .Values.jwt.signingKey }}
{{- $jwtKey = .Values.jwt.signingKey }}
{{- else }}
{{- $jwtKey = randAlphaNum 64 }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $jwtSecretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mymarina.labels" . | nindent 4 }}
type: Opaque
stringData:
  jwt-key: {{ $jwtKey | quote }}
