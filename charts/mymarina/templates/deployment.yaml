apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mymarina.api.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mymarina.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.api.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "mymarina.api.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "mymarina.api.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        {{- include "mymarina.initContainers.waitForDatabase" . | nindent 8 }}
      containers:
        - name: api
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.api.port }}
              protocol: TCP
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: {{ .Values.api.env.aspnetcoreEnvironment }}
            - name: HTTP_PORTS
              value: "{{ .Values.api.port }}"
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: {{ include "mymarina.database.credentialSecret" . }}
                  key: host
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: {{ include "mymarina.database.credentialSecret" . }}
                  key: port
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "mymarina.database.credentialSecret" . }}
                  key: dbname
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "mymarina.database.credentialSecret" . }}
                  key: user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "mymarina.database.credentialSecret" . }}
                  key: password
            - name: ConnectionStrings__Postgres
              value: "Host=$(DB_HOST);Port=$(DB_PORT);Database=$(DB_NAME);Username=$(DB_USER);Password='$(DB_PASSWORD)';GSS Encryption Mode=Disable"
            - name: ConnectionStrings__Redis
              valueFrom:
                secretKeyRef:
                  name: {{ include "mymarina.redis.credentialSecret" . }}
                  key: redis-connection-string
            - name: Jwt__Key
              valueFrom:
                secretKeyRef:
                  name: {{ include "mymarina.jwt.credentialSecret" . }}
                  key: jwt-key
            - name: Jwt__Issuer
              value: {{ .Values.api.env.jwtIssuer }}
            - name: Jwt__Audience
              value: {{ .Values.api.env.jwtAudience }}
            - name: Jwt__ExpiryMinutes
              value: {{ .Values.api.env.jwtExpiryMinutes | quote }}
            - name: Cors__AllowedOrigins__0
              value: {{ .Values.api.env.corsAllowedOrigin }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 10
          {{- with .Values.api.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
