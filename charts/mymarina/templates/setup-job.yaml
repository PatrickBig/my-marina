{{- if .Values.setupJob.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "mymarina.fullname" . }}-setup
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mymarina.labels" . | nindent 4 }}
    app.kubernetes.io/component: setup
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-delete-policy": hook-succeeded,before-hook-creation
spec:
  backoffLimit: 1
  template:
    metadata:
      labels:
        {{- include "mymarina.labels" . | nindent 8 }}
        app.kubernetes.io/component: setup
    spec:
      {{- with .Values.setupJob.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      restartPolicy: Never
      initContainers:
        {{- include "mymarina.initContainers.waitForDatabase" . | nindent 8 }}
      containers:
        - name: api
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          args: ["--setup"]
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: {{ .Values.api.env.aspnetcoreEnvironment }}
            - name: HTTP_PORTS
              value: "{{ .Values.api.port }}"
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: {{ include "mymarina.database.credentialSecret" . }}
                  key: host
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: {{ include "mymarina.database.credentialSecret" . }}
                  key: port
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "mymarina.database.credentialSecret" . }}
                  key: dbname
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "mymarina.database.credentialSecret" . }}
                  key: user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "mymarina.database.credentialSecret" . }}
                  key: password
            - name: ConnectionStrings__Postgres
              value: "Host=$(DB_HOST);Port=$(DB_PORT);Database=$(DB_NAME);Username=$(DB_USER);Password='$(DB_PASSWORD)';SSL Mode={{ .Values.database.sslMode }};GSS Encryption Mode=Disable"
            - name: ConnectionStrings__Redis
              valueFrom:
                secretKeyRef:
                  name: {{ include "mymarina.redis.credentialSecret" . }}
                  key: redis-connection-string
            - name: Jwt__Key
              valueFrom:
                secretKeyRef:
                  name: {{ include "mymarina.jwt.credentialSecret" . }}
                  key: jwt-key
            - name: Jwt__Issuer
              value: {{ .Values.api.env.jwtIssuer }}
            - name: Jwt__Audience
              value: {{ .Values.api.env.jwtAudience }}
            - name: Jwt__ExpiryMinutes
              value: {{ .Values.api.env.jwtExpiryMinutes | quote }}
            - name: Cors__AllowedOrigins__0
              value: {{ .Values.api.env.corsAllowedOrigin }}
            - name: Setup__PlatformOperator__Email
              value: {{ .Values.setupJob.platformOperatorEmail | quote }}
            - name: Setup__PlatformOperator__Password
              value: {{ .Values.setupJob.platformOperatorPassword | quote }}
            - name: Setup__InitialMarina__TenantName
              value: {{ .Values.setupJob.initialMarina.tenantName | quote }}
            - name: Setup__InitialMarina__TenantSlug
              value: {{ .Values.setupJob.initialMarina.tenantSlug | quote }}
            - name: Setup__InitialMarina__OwnerEmail
              value: {{ .Values.setupJob.initialMarina.ownerEmail | quote }}
            - name: Setup__InitialMarina__OwnerPassword
              value: {{ .Values.setupJob.initialMarina.ownerPassword | quote }}
{{- end }}
