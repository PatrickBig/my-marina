apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "mymarina.fullname" . }}-test-connection"
  labels:
    {{- include "mymarina.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: wget
      image: busybox
      command: ['wget']
      args: ['{{ include "mymarina.api.name" . }}:{{ .Values.api.port }}']
  restartPolicy: Never
