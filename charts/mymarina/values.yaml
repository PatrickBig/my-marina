nameOverride: ""
fullnameOverride: ""

imagePullSecrets: []

# --- JWT ---
jwt:
  # Leave blank to auto-generate a random 64-char key on first install (recommended).
  # Set explicitly only if you need a stable, pre-known key (e.g. for key rotation).
  signingKey: ""

# --- API ---
api:
  replicaCount: 1
  image:
    repository: ghcr.io/patrickbig/my-marina/api
    tag: latest
    pullPolicy: Always
  port: 8080
  nodeSelector:
    kubernetes.io/arch: amd64
  resources:
    requests:
      cpu: 100m
      memory: 100Mi
    limits:
      cpu: 500m
      memory: 512Mi
  env:
    aspnetcoreEnvironment: Production
    jwtIssuer: mymarina-api
    jwtAudience: mymarina-clients
    jwtExpiryMinutes: "60"
    corsAllowedOrigin: https://app.mymarina.org

# --- Web UI ---
webui:
  replicaCount: 1
  image:
    repository: ghcr.io/patrickbig/my-marina/web
    tag: latest
    pullPolicy: Always
  port: 8080
  resources: {}

# --- Marketing site ---
marketing:
  enabled: true
  replicaCount: 2
  image:
    repository: ghcr.io/patrickbig/my-marina/marketing
    tag: latest
    pullPolicy: Always
  port: 8080
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

# --- Ingress ---
ingress:
  enabled: true
  className: traefik
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
  appHost: app.mymarina.org
  apiHost: api.mymarina.org
  marketingHost: mymarina.org
  tlsSecretName: mymarina-tls

# --- PostgresCluster (Crunchy Data Postgres Operator) ---
database:
  enabled: true
  postgresVersion: 17
  username: mymarina
  schema: mymarina
  sslMode: Require
  readinessTimeoutSeconds: 300
  storage: 10Gi
  backupStorage: 10Gi
  storageClassName: nfs-csi-slow

# --- Redis ---
redis:
  enabled: true
  image: redis:7.2
  storage: 2Gi
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

# --- Setup job (Helm post-install and post-upgrade hook) ---
setupJob:
  enabled: true
  nodeSelector: {}
  platformOperatorEmail: patrick@mymarina.org
  platformOperatorPassword: "Testpasswordhotdate1!"
  initialMarina:
    tenantName: "Bigler Point Marina"
    tenantSlug: "bigler-point"
    ownerEmail: patrick@biglernet.com
    ownerPassword: "Testpasswordhotdate1!"

# --- Service Account ---
serviceAccount:
  create: false
  automount: true
  annotations: {}
  name: ""

# --- Horizontal Pod Autoscaler (targets the API deployment) ---
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
