services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: mymarina
      POSTGRES_USER: mymarina
      POSTGRES_PASSWORD: mymarina
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mymarina"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=mymarina;Username=mymarina;Password=mymarina;SSL Mode=Disable"
      ConnectionStrings__Redis: "redis:6379"
      Jwt__Key: "dev-only-change-me-in-production-min-32ch"
      Jwt__Issuer: "mymarina-api"
      Jwt__Audience: "mymarina-clients"
      Cors__AllowedOrigins__0: "http://localhost:5173"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
