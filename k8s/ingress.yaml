# Requires: nginx-ingress-controller + cert-manager with a ClusterIssuer named "letsencrypt-prod"
#
# Install cert-manager:
#   kubectl apply -f https://github.com/cert-manager/cert-manager/releases/latest/download/cert-manager.yaml
#
# Create the ClusterIssuer (replace email):
#   kubectl apply -f k8s/cluster-issuer.yaml
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mymarina-ingress
  namespace: mymarina
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - app.mymarina.org
        - api.mymarina.org
      secretName: mymarina-tls
  rules:
    # React SPA
    - host: app.mymarina.org
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mymarina-web
                port:
                  number: 80
    # .NET API — the frontend calls /api/* which nginx-ingress strips the /api prefix
    - host: api.mymarina.org
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mymarina-api
                port:
                  number: 80
