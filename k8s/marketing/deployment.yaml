apiVersion: apps/v1
kind: Deployment
metadata:
  name: marketing
  namespace: mymarina-prod
  labels:
    app: marketing
spec:
  replicas: 2
  selector:
    matchLabels:
      app: marketing
  template:
    metadata:
      labels:
        app: marketing
    spec:
      containers:
        - name: marketing
          image: ghcr.io/patrickbig/my-marina/marketing:latest
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
