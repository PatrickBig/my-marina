# ──────────────────────────────────────────────────────────────────────────────
# secrets.yaml — DO NOT commit real values. This is a template.
#
# Postgres credentials are managed by PGO (see postgres.yaml).
# The secret mymarina-db-pguser-mymarina is created automatically.
#
# Create this secret for the remaining values:
#   kubectl create secret generic mymarina-secrets -n mymarina \
#     --from-literal=redis-connection-string="<host>:<port>,password=<pass>" \
#     --from-literal=jwt-key="<min-32-char-random-string>"
# ──────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: mymarina-secrets
  namespace: mymarina
type: Opaque
stringData:
  redis-connection-string: "REPLACE_ME"
  jwt-key:                  "REPLACE_ME"
