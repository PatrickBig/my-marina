apiVersion: apps/v1
kind: Deployment
metadata:
  name: mymarina-web
  namespace: mymarina
  labels:
    app: mymarina-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mymarina-web
  template:
    metadata:
      labels:
        app: mymarina-web
    spec:
      containers:
        - name: web
          image: ghcr.io/patrickbig/my-marina/web:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: mymarina-web
  namespace: mymarina
spec:
  selector:
    app: mymarina-web
  ports:
    - port: 80
      targetPort: 8080
